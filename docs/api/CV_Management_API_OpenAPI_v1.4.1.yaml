        url:
          type: string
          format: uri
        displayOrder:
          type: integer
          minimum: 0
          default: 0
        cvInclude:
          type: boolean
          default: true
        version:
          type: integer
          minimum: 0
          readOnly: true
          description: Optimistic-lock entity version used in If-Match.
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    CurrentUserResponse:
