      description:
        Freshness of the active saved CV relative to current structured source data. NOT_SAVED means no saved
        CV exists; CURRENT means the saved CV matches current source data; OUTDATED means one or more approved source
        areas changed after the latest save.
      enum:
        - NOT_SAVED
        - CURRENT
        - OUTDATED
    CvSourceArea:
      type: string
      description: Approved high-level source area that can make the latest saved CV outdated.
      enum:
        - PROFILE
        - DECLARED_SKILLS
        - PROJECTS
        - ACADEMIC_RECORDS
    AcademicRecordResponse:
      type: object
      additionalProperties: false
      required:
        - academicRecordId
        - subjectId
        - courseCode
        - courseTitle
        - credits
        - letterGrade
        - gradePoint
        - semester
        - academicYear
        - attemptNumber
        - resultStatus
        - committedAt
      properties:
        academicRecordId:
          type: string
          format: uuid
          readOnly: true
          description: Stable identifier of the committed official Student grade record.
        subjectId:
          type: string
          format: uuid
          readOnly: true
          description: Stable identifier of the canonical academic subject.
        courseCode:
          type: string
          minLength: 1
          maxLength: 30
          description: Official subject/course code.
        courseTitle:
          type: string
          minLength: 1
          maxLength: 250
          description: Official subject/course title.
        credits:
          type: number
          minimum: 0
          multipleOf: 0.1
          description: Official credit value committed for this result.
        letterGrade:
          type: string
          minLength: 1
          maxLength: 5
          description: Official letter grade from the committed ledger.
        gradePoint:
          type: number
          minimum: 0
          maximum: 4
          multipleOf: 0.01
          description: Official grade-point value from the committed ledger.
        semester:
          type: string
          minLength: 1
          maxLength: 80
          description: Official semester/period label.
        academicYear:
          type: string
          minLength: 1
          maxLength: 30
          description: Official academic-year label.
        attemptNumber:
          type: integer
          minimum: 1
          description: Attempt number retained by the official ledger.
        resultStatus:
          type: string
          minLength: 1
          maxLength: 30
          description: Official result status supplied by the committed ledger.
        committedAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp at which the record became official committed data.
      description:
        One official committed academic result. Students can read only their own records and cannot mutate
        this DTO.
      examples:
        - academicRecordId: 10000000-0000-4000-8000-000000000001
          subjectId: 20000000-0000-4000-8000-000000000001
          courseCode: CSC3112
          courseTitle: Web Technologies
          credits: 4.0
          letterGrade: A-
          gradePoint: 3.7
          semester: Semester 1
          academicYear: 2025/2026
          attemptNumber: 1
          resultStatus: PASSED
          committedAt: '2026-07-20T09:30:00Z'
