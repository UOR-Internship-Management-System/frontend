          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '415':
          $ref: '#/components/responses/Error415'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'
      description: 'Access: Admin. Audit: Yes. Archive contains latest saved ATS-compliant CV PDFs.'
      parameters:
        - name: exportJobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: exportJobId identifier.
  /admin/audit-events:
    get:
      tags:
        - Audit/System Events
      summary: Retrieve Admin-visible audit events when enabled by policy.
      operationId: getAdminAuditEvents
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAuditEventResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '415':
          $ref: '#/components/responses/Error415'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'
      description: 'Access: Admin. Audit: No. May be omitted if audit remains internal backend concern.'
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Search'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Zero-based page index.
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size with an implementation-defined upper bound.
    Sort:
      name: sort
      in: query
      schema:
        type: string
      description: Sort expression such as createdAt,desc.
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Search term applied to approved searchable fields.
    IfMatchVersion:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        pattern: ^"[0-9]+"$
        examples:
          - '"3"'
      description:
        Quoted entity version from the most recent response, for example `"3"`. The server returns 412 when
        the entity has changed.
    ClusterIdFilter:
      name: clusterId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description:
        Optional stable Core Cluster identifier. Category results are limited to that cluster; skill results
        are limited to skills mapped through categories in that cluster.
    CategoryIdFilter:
      name: categoryId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description:
        Optional stable Skill Category identifier. Skill results are limited to canonical Individual Skills
        mapped to this category.
  responses:
    Error400:
      description: Bad request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error401:
      description: Authentication required or invalid token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error403:
      description: Access denied.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error404:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error409:
      description: Conflict.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error412:
      description: Precondition failed or version conflict.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error415:
      description: Unsupported media type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error422:
      description: Validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error429:
      description: Too many requests.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error500:
      description: Internal server error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error503:
      description: Service unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error413:
      description: Payload too large.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error428:
      description: Precondition required.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    DuplicateDeclaredSkill409:
      description: The Student has already declared the selected canonical taxonomy skill.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            duplicateDeclaredSkill:
              summary: Duplicate declared skill
              value:
                type: https://uor-cv-system/errors/declared-skill-duplicate
                title: Declared skill already exists
                status: 409
                code: DECLARED_SKILL_DUPLICATE
                message: React is already present in the Student declared-skill list.
                correlationId: req-20260716-0409
                details:
                  skillId: 11111111-1111-4111-8111-111111111111
    InvalidProjectDateRange422:
      description: Project validation failed because endDate is before startDate.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            invalidProjectDateRange:
              summary: Invalid project date range
              value:
                type: https://uor-cv-system/errors/project-date-range-invalid
                title: Project date range is invalid
                status: 422
                code: PROJECT_DATE_RANGE_INVALID
                message: endDate must not be before startDate.
                correlationId: req-20260716-0422
                fieldErrors:
                  - field: endDate
                    code: INVALID_DATE_RANGE
                    message: endDate must not be before startDate.
    StaleProjectVersion412:
      description: The supplied project entity version is stale.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            staleProjectVersion:
              summary: Stale project update
              value:
                type: https://uor-cv-system/errors/version-conflict
                title: Project version conflict
                status: 412
                code: VERSION_CONFLICT
                message: The project changed after it was loaded. Refresh and retry with the latest version.
                correlationId: req-20260716-0412
                details:
                  projectId: 660e8400-e29b-41d4-a716-446655440001
                  submittedVersion: 2
                  currentVersion: 3
    MissingIfMatch428:
      description: The required If-Match entity-version header is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            missingIfMatch:
              summary: Missing optimistic-concurrency precondition
              value:
                type: https://uor-cv-system/errors/precondition-required
                title: Precondition required
                status: 428
                code: IF_MATCH_REQUIRED
                message: Supply the latest quoted entity version in the If-Match header.
                correlationId: req-20260716-0428
    InvalidCvConfiguration422:
      description: The CV preview configuration is structurally valid but semantically invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            invalidCvConfiguration:
              summary: Invalid CV configuration
              value:
                type: https://uor-cv-system/errors/cv-configuration-invalid
                title: CV configuration is invalid
                status: 422
                code: CV_CONFIGURATION_INVALID
                message: One or more selected records cannot be included in this CV preview.
                correlationId: req-20260721-0422
    CvPreviewExpired409:
      description: The preview exists but expired or was invalidated before it could be saved.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            cvPreviewExpired:
              summary: CV preview expired
              value:
                type: https://uor-cv-system/errors/cv-preview-expired
                title: CV preview expired
                status: 409
                code: CV_PREVIEW_EXPIRED
                message: Generate a new preview before saving the CV.
                correlationId: req-20260721-0409
                details:
                  previewId: 70000000-0000-4000-8000-000000000001
    StaleCv412:
      description: The active CV revision changed before this replacement request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://uor-cv-system/errors/stale-version
            title: Precondition failed
            status: 412
            code: STALE_VERSION
            message: The saved CV changed in another request.
            correlationId: req-20260718-0412
    CvPreconditionRequired428:
      description: The required first-create or replacement conditional header is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://uor-cv-system/errors/precondition-required
            title: Precondition required
            status: 428
            code: PRECONDITION_REQUIRED
            message: A current conditional request header is required.
            correlationId: req-20260718-0428
    CvGenerationFailed503:
      description: The backend-controlled LaTeX/PDF generation service could not complete the requested operation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            cvGenerationFailed:
              summary: CV generation failed
              value:
                type: https://uor-cv-system/errors/cv-generation-failed
                title: CV generation unavailable
                status: 503
                code: CV_GENERATION_FAILED
                message: The CV could not be generated at this time.
                correlationId: req-20260721-0503
                details: {}
    NoSavedCv404:
      description: No active saved CV exists for the authenticated Student.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            noSavedCv:
              summary: No saved CV
              value:
                type: https://uor-cv-system/errors/cv-not-saved
                title: No saved CV is available
                status: 404
                code: CV_NOT_SAVED
                message: Save the CV before downloading it.
                correlationId: req-20260721-0404
                details: {}
    CvFileUnavailable503:
      description: The saved CV metadata exists but its generated PDF is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            cvFileUnavailable:
              summary: CV PDF unavailable
              value:
                type: https://uor-cv-system/errors/cv-file-unavailable
                title: CV PDF unavailable
                status: 503
                code: CV_FILE_UNAVAILABLE
                message: The saved CV PDF cannot be downloaded at this time.
                correlationId: req-20260721-1503
                details: {}
    AcademicDataUnavailable503:
      description: The committed academic ledger service is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            academicDataUnavailable:
              summary: Academic data unavailable
              value:
                type: https://uor-cv-system/errors/academic-data-unavailable
                title: Academic data unavailable
                status: 503
                code: ACADEMIC_DATA_UNAVAILABLE
                message: Official academic data cannot be loaded at this time.
                correlationId: req-20260721-2503
                details: {}
  schemas:
    AcademicLedgerCommitRequest:
      type: object
      properties:
        confirm:
          type: boolean
          const: true
    AcademicLedgerCommitResponse:
      type: object
