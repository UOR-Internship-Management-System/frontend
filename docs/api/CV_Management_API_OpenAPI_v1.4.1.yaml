        - requestId
      properties:
        requestId:
          type: string
          format: uuid
        runtimeGpaLowerBound:
          type: number
          format: double
          minimum: 0
          maximum: 4
        runtimeGpaUpperBound:
          type: number
          format: double
          minimum: 0
          maximum: 4
        skillIds:
          type: array
          items:
            type: string
            format: uuid
        competencyLevels:
          type: array
          items:
            type: string
            enum:
              - BEGINNER
              - INTERMEDIATE
              - ADVANCED
    CandidateFilteringRunResponse:
      type: object
      properties:
        filterRunId:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
        criteria:
          type: object
          additionalProperties: true
        candidateCount:
          type: integer
        createdAt:
          type: string
          format: date-time
    CertificateResponse:
      type: object
