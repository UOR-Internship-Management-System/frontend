        name:
          type: string
        industry:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        notes:
          type: string
    CompanyResponse:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        name:
          type: string
        industry:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        notes:
          type: string
    ContactLinkResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - url
        - displayOrder
        - cvInclude
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
