        activityName:
          type: string
          minLength: 1
          maxLength: 200
        roleTitle:
          type: string
          minLength: 1
          maxLength: 150
        startDate:
          type:
            - string
            - 'null'
          format: date
        endDate:
          type:
            - string
            - 'null'
          format: date
          description: Optional end date; when both dates are present, it must not precede startDate.
        description:
          type:
            - string
            - 'null'
        cvInclude:
          type: boolean
          default: true
        version:
          type: integer
          minimum: 0
          readOnly: true
          description: Optimistic-lock entity version used in If-Match.
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    AdminDashboardMetricsResponse:
      type: object
