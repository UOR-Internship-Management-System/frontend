        - userId
        - email
        - primaryRole
        - roles
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
          maxLength: 254
        displayName:
          type:
            - string
            - 'null'
        primaryRole:
          $ref: '#/components/schemas/AccountType'
        roles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/AccountType'
    CvFreshnessResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - changedAreas
        - cvId
        - savedAt
        - evaluatedAt
        - message
      properties:
        status:
          $ref: '#/components/schemas/CvFreshnessStatus'
        changedAreas:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/CvSourceArea'
          description: Changed source areas. Empty for NOT_SAVED and CURRENT; non-empty for OUTDATED.
        cvId:
          type:
            - string
            - 'null'
          format: uuid
          readOnly: true
          description: Active saved CV identifier, or null when status is NOT_SAVED.
        savedAt:
          type:
            - string
            - 'null'
          format: date-time
          readOnly: true
          description: Latest save timestamp, or null when status is NOT_SAVED.
        evaluatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp at which freshness was evaluated.
        message:
          type: string
          minLength: 1
          description: Informational display message; clients must use status and changedAreas for logic.
      description: Typed CV source-freshness result; it never represents an Admin review state.
      examples:
        - *id003
        - *id004
        - *id005
        - *id006
    CvPreviewRequest:
      type: object
      additionalProperties: false
      required:
        - includedExperienceIds
        - includedProjectIds
        - includedCertificateIds
        - includedAwardIds
        - includedActivityIds
