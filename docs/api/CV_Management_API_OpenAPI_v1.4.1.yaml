    AdminStudentDetailResponse:
      type: object
      properties:
        student:
          $ref: '#/components/schemas/StudentSummaryResponse'
        profile:
          $ref: '#/components/schemas/StudentProfileResponse'
        latestCv:
          $ref: '#/components/schemas/CvResponse'
    AuthTokenResponse:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
        - user
      properties:
        accessToken:
          type: string
          minLength: 1
        tokenType:
          type: string
          const: Bearer
        expiresInSeconds:
          type: integer
          minimum: 1
        user:
          $ref: '#/components/schemas/CurrentUserResponse'
    AwardResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - issuer
        - awardDate
        - description
        - cvInclude
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        issuer:
          type: string
          minLength: 1
          maxLength: 200
        awardDate:
          type: string
          format: date
        description:
          type:
            - string
            - 'null'
        cvInclude:
          type: boolean
          default: true
        version:
          type: integer
          minimum: 0
          readOnly: true
          description: Optimistic-lock entity version used in If-Match.
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    CandidateFilteringRunRequest:
      type: object
