        includedExperienceIds:
          $ref: '#/components/schemas/CvSelectedRecordIds'
        includedProjectIds:
          $ref: '#/components/schemas/CvSelectedRecordIds'
        includedCertificateIds:
          $ref: '#/components/schemas/CvSelectedRecordIds'
        includedAwardIds:
          $ref: '#/components/schemas/CvSelectedRecordIds'
        includedActivityIds:
          $ref: '#/components/schemas/CvSelectedRecordIds'
      description: Student-controlled record selections. Empty lists omit their section. The backend validates ownership and applies the fixed default structural order.
    CvPreviewResponse:
      type: object
      additionalProperties: false
      required:
        - previewId
        - htmlPreview
        - freshness
        - configuration
        - generatedAt
        - expiresAt
      properties:
        previewId:
          type: string
          format: uuid
          readOnly: true
        htmlPreview:
          type: string
          minLength: 1
          readOnly: true
          description: Backend-generated sanitized HTML fragment rendered only through the approved frontend sanitizing boundary.
        freshness:
          $ref: '#/components/schemas/CvFreshnessResponse'
        configuration:
          $ref: '#/components/schemas/CvPreviewConfigurationResponse'
        generatedAt:
          type: string
          format: date-time
          readOnly: true
        expiresAt:
          type: string
          format: date-time
          readOnly: true
      description: Expiring preview snapshot. Generated LaTeX remains internal and is never exposed by this API.
    CvSaveRequest:
      type: object
      additionalProperties: false
      required:
        - previewId
      properties:
        previewId:
          type: string
          format: uuid
      description: Saves the exact unexpired owner-scoped preview as the Student's single active CV.
    CvResponse:
      type: object
      additionalProperties: false
      required:
        - cvId
        - revision
        - createdAt
        - generatedAt
        - savedAt
        - downloadUrl
        - freshnessStatus
        - configuration
        - pdfFile
      properties:
        cvId:
          type: string
          format: uuid
          readOnly: true
        revision:
          type: integer
          minimum: 1
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        generatedAt:
          type: string
          format: date-time
          readOnly: true
        savedAt:
          type: string
          format: date-time
          readOnly: true
        downloadUrl:
          type: string
          pattern: ^/me/cv/download$
          readOnly: true
        freshnessStatus:
          type: string
          enum: [CURRENT, OUTDATED]
          readOnly: true
        configuration:
          $ref: '#/components/schemas/CvPreviewConfigurationResponse'
        pdfFile:
          $ref: '#/components/schemas/GeneratedFileMetadataResponse'
      description: The Student's single active saved CV. Revision is an optimistic-concurrency token, not a history number.
    DeclaredSkillCreateRequest:
      type: object
      additionalProperties: false
      required:
