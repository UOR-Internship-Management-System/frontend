          default: true
      allOf:
        - if:
            properties:
              currentRole:
                const: true
            required:
              - currentRole
          then:
            properties:
              endDate:
                type: 'null'
        - if:
            properties:
              currentRole:
                const: false
            required:
              - currentRole
          then:
            required:
              - endDate
