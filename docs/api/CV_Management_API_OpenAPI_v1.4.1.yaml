        - issuer
        - issueDate
        - credentialUrl
        - cvInclude
        - evidence
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        issuer:
          type: string
          minLength: 1
          maxLength: 200
        issueDate:
          type: string
          format: date
        credentialUrl:
          type:
            - string
            - 'null'
          format: uri
        cvInclude:
          type: boolean
          default: true
        evidence:
          anyOf:
            - $ref: '#/components/schemas/FileAssetResponse'
            - type: 'null'
          readOnly: true
        version:
          type: integer
          minimum: 0
          readOnly: true
          description: Optimistic-lock entity version used in If-Match.
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    CompanyRequest:
      type: object
      required:
