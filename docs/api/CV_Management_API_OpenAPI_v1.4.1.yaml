openapi: 3.1.1
info:
  title: CV Management and Deterministic Internship Candidate Filtering API
  version: 1.4.1
  description:
    REST/JSON API contract for the locked Version 1 scope. Version 1.4.1 defines the fixed-order Student CV
    Builder, one active saved CV per Student, ATS-compliant PDF output, official academic records, RBAC boundaries, and
    optimistic-concurrency rules.
  x-revision-summary:
    - Preserved every valid Sprint 1–4 path and operation ID from OpenAPI v1.3.0.
    - Finalized strict typed Student academic-record and official Computer Science GPA response contracts.
    - Defined successful empty academic-record and GPA-unavailable states without treating them as missing resources.
    - Replaced five master section toggles with five owner-scoped record-selection lists.
    - Added strict source-area, freshness-status, GPA-availability, and record-level CV configuration contracts.
    - Added the first-time NOT_SAVED CV freshness state and active-CV metadata.
    - Finalized backend-generated sanitized HTML preview without exposing internal generator source.
    - Linked active CV create/replacement atomically to the exact preview with conditional request headers.
    - Removed client-controlled section ordering, saved-version history, and version-specific downloads.
    - Restricted Student and Admin CV downloads to application/pdf with safe attachment filenames.
    - Narrowed Sprint 5 operation responses to method-appropriate Problem Details outcomes.
    - Added Sprint 5 success, empty-state, validation, expiry, generation-failure, and file-unavailable examples.
  x-implementation-status:
    frontendContract: READY
    backendImplementation: ACTIVE
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Authentication
  - name: Student Verification and OTP
  - name: Password Reset
    description: Shared OTP-based password recovery for supported STUDENT and ADMIN accounts.
  - name: Student Dashboard
    description: Authenticated Student summary metrics sourced from persisted backend data.
  - name: Student Profile
    description: Authenticated Student-owned profile, CV-supporting records, and profile file operations.
  - name: Declared Skills and Taxonomy
  - name: Project Portfolio
  - name: Academic Records
  - name: CV Generation and Active CV
  - name: Admin Dashboard
  - name: Academic Ledger
  - name: Registered Students
  - name: Company Metadata
  - name: Internship Requests
  - name: Candidate Filtering
  - name: Shortlists
  - name: Exports
  - name: Audit/System Events
