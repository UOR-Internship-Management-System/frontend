<div class="signup-container">
<div class="info-panel">
<h1>Launch your placement profile.</h1>
<p>Welcome to the department's centralized talent placement ecosystem. Submit your registration request to initialize your single-source profile pipeline.</p>
</div>
<div class="form-panel"><button class="theme-toggle auth-theme-toggle" id="themeToggle" type="button"><span class="material-symbols-outlined">dark_mode</span><span>Dark Mode</span></button>
<div class="form-header">
<h2>Student Registration</h2>
<p>Initialize your passwordless account authorization request below.</p>
</div>
<form action="#" method="POST" onsubmit="event.preventDefault();">
<div class="input-group">
<md-outlined-text-field autocomplete="name" label="Full Name" placeholder="e.g., K. Kavindu Lakshan" required="" type="text">
</md-outlined-text-field>
</div>
<div class="input-group">
<md-outlined-text-field autocomplete="off" label="Index Number" placeholder="e.g., SC/2022/12865" required="" type="text">
</md-outlined-text-field>
</div>
<div class="input-group">
<md-outlined-text-field autocomplete="email" label="University Email Address" placeholder="e.g., username@usci.ruh.ac.lk" required="" type="email">
</md-outlined-text-field>
</div>
<md-filled-button class="btn-submit" type="submit">Send Request</md-filled-button>
</form>
</div>
</div>
<script id="direct-ui-theme-script">
// Direct standalone UI theme controller: local to this HTML file.
(function () {
    function applyStoredTheme() {
        const stored = localStorage.getItem('studentPortalDarkMode');
        const legacy = localStorage.getItem('student-ui-theme');
        if (stored === 'true' || (stored === null && legacy === 'dark')) {
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
        }
        updateThemeButton();
    }
    function toggleThemeMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('studentPortalDarkMode', document.body.classList.contains('dark-mode'));
        updateThemeButton();
    }
    function updateThemeButton() {
        const button = document.getElementById('themeToggle');
        if (!button) return;
        const active = document.body.classList.contains('dark-mode');
        button.innerHTML = '<span class="material-symbols-outlined">' + (active ? 'light_mode' : 'dark_mode') + '</span><span>' + (active ? 'Light Mode' : 'Dark Mode') + '</span>';
    }
    window.applyStoredTheme = window.applyStoredTheme || applyStoredTheme;
    window.toggleThemeMode = window.toggleThemeMode || toggleThemeMode;
    window.updateThemeButton = window.updateThemeButton || updateThemeButton;
    document.addEventListener('DOMContentLoaded', function () {
        applyStoredTheme();
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle && !themeToggle.dataset.directUiBound) {
            themeToggle.dataset.directUiBound = 'true';
            themeToggle.addEventListener('click', toggleThemeMode);
        }
    });
})();
</script><script defer="" src="assets/js/app.js"></script>
<script defer="" src="assets/js/pages/signup.js"></script>
