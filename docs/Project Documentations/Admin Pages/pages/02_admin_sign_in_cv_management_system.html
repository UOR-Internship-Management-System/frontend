        :root {

            --md-sys-color-primary: #6750A4;

        /* Enforce global styling consistency */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif !important;
        }

        body {
            background-color: var(--md-sys-color-surface-container);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 1340px Structural Container Framework preserved */
        .signin-container {
            display: flex;
            background-color: #FFFFFF;
            width: 100%;
            max-width: 1340px; 
            min-height: 820px;
            border-radius: 28px; /* Extra-large M3 card token rounding alignment */
            overflow: hidden;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
        }

        /* Left Split Panel Layout: Typography Core */
        .welcome-panel {
            flex: 1.1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #FFFFFF;
        }

        .welcome-panel h1 {
            font-size: 4.8rem; 
            font-weight: 700;
            line-height: 1.1;
            color: #1D1B20;
            letter-spacing: -1.5px;
        }

        .welcome-panel h1 span {
            font-style: italic;
            font-weight: 400;
            color: #49454F;
        }

        /* Right Split Panel Layout: Functional Context Controls */
        .form-panel {
            flex: 0.9;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #FFFFFF;
            border-left: 1px solid #E1DFFF;
        }

        /* Central Login Box Card Structure */
        .form-card {
            background-color: #FFFFFF;
            border-radius: 24px;
            padding: 54px 48px;
        }

        .form-title {
            font-size: 1.85rem; 
            font-weight: 700;
            color: #1D1B20;
            text-align: center;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        /* Standard Material Text Field UI Properties overrides */
        md-outlined-text-field {
            width: 100%;
            --md-outlined-text-field-container-shape: 12px;
            --md-outlined-text-field-input-text-font: 'Google Sans', sans-serif;
            --md-outlined-text-field-label-text-font: 'Google Sans', sans-serif;
        }

        .btn-submit {
            display: block;
            width: 100%;
            max-width: 220px; 
            margin: 42px auto 0 auto;
            --md-filled-button-label-text-font: 'Google Sans', sans-serif;
        }

        /* Predefined credential support wrapper matching reference styling rules */
        .support-link-wrapper {
            text-align: center;
            margin-top: 28px;
            font-size: 0.95rem;
            color: #49454F;
        }

        .support-link {
            color: var(--md-sys-color-primary);
            font-weight: 500;
            text-decoration: none;
        }

        .support-link:hover {
            text-decoration: underline;
        }

        /* Responsive Adaptive Screen Layout Rules */
        @media (max-width: 1100px) {
            .welcome-panel h1 {
                font-size: 3.8rem;
            }
        }

        @media (max-width: 992px) {
            .signin-container {
                flex-direction: column;
                max-width: 550px;
                min-height: auto;
            }

            .welcome-panel {
                padding: 40px;
                text-align: center;
            }

            .welcome-panel h1 {
                font-size: 3.2rem;
            }

            .form-panel {
                padding: 20px 40px 40px 40px;
                border-left: none;
            }

            .form-card {
                padding: 36px 24px;
            }

            .btn-submit {
                max-width: 100%;
                color: #FFFFFF;
                background-color: var(--md-sys-color-primary);
            }

.modal-actions { display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--border-color) !important; padding-top: 20px; flex-wrap: wrap; }
.pagination-wrapper, .pagination-auto-wrapper {
    display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid var(--border-color) !important;
    margin-top: 8px; flex-wrap: wrap; gap: 16px;
}
.pagination-info { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
.pagination-controls, .pagination-container { display: flex; align-items: center; gap: 6px; border: none !important; }
.pagination-btn, .page-num {
    min-width: 40px; height: 40px; padding: 0 12px; border-radius: var(--radius-md) !important; border: 1px solid var(--border-color) !important;
    background-color: var(--bg-canvas) !important; color: var(--text-dark) !important; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; gap: 4px;
}
.pagination-btn:hover:not(:disabled), .page-num:hover:not(.active) { background-color: var(--bg-light) !important; border-color: var(--md-sys-color-primary) !important; color: var(--md-sys-color-primary) !important; }
.pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.theme-toggle {
    position: fixed; top: 18px; right: 18px; width: 48px; height: 48px; border: 1px solid var(--border-color);
    border-radius: var(--radius-pill); background: var(--bg-canvas); color: var(--text-dark); box-shadow: var(--shadow-card); z-index: 1200;
    display: inline-flex; align-items: center; justify-content: center;
}

.app-alert-content { display: flex; gap: 16px; align-items: flex-start; }
.app-alert-icon { color: var(--md-sys-color-primary); font-size: 36px !important; }
.app-alert-message { color: var(--text-muted); line-height: 1.6; }

.global-loading-mask.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.skeleton-board { width: min(100%, 920px); display: grid; gap: 18px; }

.skeleton-card { display: flex; flex-direction: column; gap: 14px; background: var(--bg-canvas); border-radius: var(--radius-xl); padding: 28px; box-shadow: var(--shadow-card); }

.skeleton-line-text { width: 72%; }
.skeleton-line-short { width: 36%; }
.skeleton-table { display: grid; gap: 10px; }
.skeleton-table-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.skeleton-table-cell { height: 18px; border-radius: var(--radius-sm); }
@keyframes rowComponentIntro { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes microScalePop { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes skeletonShimmer { 0% { background-position: -240px 0; } 100% { background-position: 240px 0; } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } .skeleton { animation: none; background: var(--skeleton-base); } }
@media (max-width: 992px) {
    body { padding: 20px !important; }
    .main-container, .admin-container { gap: 24px; }
    .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card-section, .modal-window-card { padding: 24px !important; }
    .form-grid-layout, .modal-filter-row, .split-dashboard-pane, .portfolio-grid, .hard-bounds-row { grid-template-columns: 1fr !important; }
    .form-span-full { grid-column: span 1; }
    .toolbar-search, .search-wrapper, .sort-dropdown-wrapper, md-filled-button, md-outlined-button { max-width: 100%; min-width: 0 !important; width: 100%; }
    .text-right { text-align: left; }

    .theme-toggle { top: 12px; right: 12px; }
}
@media (max-width: 600px) {
    .page-header h1, .page-title, header > h1 { font-size: 1.8rem !important; }
    .metrics-grid { grid-template-columns: 1fr; }
    .welcome-panel h1 { font-size: 3rem !important; }
    .signin-container { border-radius: var(--radius-xl) !important; }
    .uploader-dropzone { padding: 32px 16px !important; }
    table, thead, tbody, th, td, tr { display: block; }
    thead { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
    tbody tr { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 8px; margin-bottom: 12px; }
    td { border-bottom: 1px solid var(--border-color) !important; }
    td:last-child { border-bottom: none !important; }
    .pagination-wrapper, .pagination-auto-wrapper { justify-content: center; }
}
