openapi: 3.1.1
info:
  title: CV Management and Deterministic Internship Candidate Filtering API
  version: 1.5.0
  description: REST/JSON API contract for the locked Version 1 scope. Version 1.5.0 preserves the finalized Sprint 1–5 Student
    and active-CV contracts and freezes the Sprint 6 Admin Dashboard, Academic Ledger, committed academic inspection, and
    Registered Students transport contracts.
  x-revision-summary:
  - Preserved every valid Sprint 1–5 path and operationId from OpenAPI v1.4.1.
  - Finalized strict persisted Admin dashboard metrics.
  - Froze one UTF-8 CSV academic-ledger file contract with a 5 MiB maximum payload.
  - Separated ledger upload lifecycle status from validation status and documented transitions.
  - Added typed upload summaries/details, staged rows, validation diagnostics, and commit results.
  - Added paginated staged-row retrieval without row-editing or rollback operations.
  - Defined atomic commit state locking, repeated-commit conflicts, and GPA recalculation metadata.
  - Finalized Registered Students level filtering, constrained sorting, explicit search semantics, degree program, batch,
    and nullable GPA.
  - Finalized read-only per-Student committed academic-record search/filter/pagination for the ledger details modal.
  - Narrowed Sprint 6 responses to method-appropriate Problem Details outcomes and added ledger-specific 409/413/415/422/500
    examples.
  - Kept Admin Login compatible and left Student Deep-Dive implementation scope for Sprint 7.
  x-implementation-status:
    frontendContract: READY
    backendImplementation: ACTIVE
    sprint6FrontendImplementation: PLANNED
    sprint6BackendImplementation: PLANNED
  x-academic-ledger-file-contract:
    format: CSV
    mediaType: text/csv
    extension: .csv
    charset: UTF-8
    maxSizeBytes: 5242880
    headerRowRequired: true
    headerOrderRequired: true
    columns:
    - name: student_index_number
      required: true
      description: Existing eligible Student index number.
    - name: course_code
      required: true
      description: Canonical subject code resolved by the backend.
    - name: credits
      required: true
      description: Positive subject credit value.
    - name: letter_grade
      required: true
      description: Grade resolved through the developer-managed grade scale.
    - name: semester
      required: true
      description: Official semester or period label.
    - name: academic_year
      required: true
      description: Academic year in YYYY/YYYY form.
    - name: attempt_number
      required: true
      description: Positive attempt number.
    - name: result_status
      required: true
      description: Official result status such as PASSED or FAILED.
    derivedFields:
    - studentId
    - courseTitle
    - gradePoint
    duplicateBehavior: The backend may compute an internal content digest. Identical content matching an active or committed
      upload is rejected with 409. A prior PROCESSING_FAILED or VALIDATION_FAILED batch does not prevent a corrected file
      upload.
