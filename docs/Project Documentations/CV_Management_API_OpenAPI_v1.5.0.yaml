    AcademicLedgerUploadStatus:
      type: string
      enum:
      - RECEIVED
      - PROCESSING
      - STAGED
      - READY_TO_COMMIT
      - COMMITTING
      - COMMITTED
      - VALIDATION_FAILED
      - PROCESSING_FAILED
      description: Upload-batch lifecycle. Commit is permitted only in READY_TO_COMMIT. COMMITTED, VALIDATION_FAILED, and
        PROCESSING_FAILED are terminal for the batch. A failed commit transaction returns the batch to READY_TO_COMMIT.
      x-state-transitions:
        RECEIVED:
        - PROCESSING
        PROCESSING:
        - STAGED
        - PROCESSING_FAILED
        STAGED:
        - READY_TO_COMMIT
        - VALIDATION_FAILED
        READY_TO_COMMIT:
        - COMMITTING
        COMMITTING:
        - COMMITTED
        - READY_TO_COMMIT
        COMMITTED: []
        VALIDATION_FAILED: []
        PROCESSING_FAILED: []
    AcademicLedgerValidationStatus:
      type: string
      enum:
      - NOT_STARTED
      - IN_PROGRESS
      - PASSED
      - FAILED
      description: Validation lifecycle independent of the upload-processing lifecycle.
      x-state-transitions:
        NOT_STARTED:
        - IN_PROGRESS
        IN_PROGRESS:
        - PASSED
        - FAILED
        PASSED: []
        FAILED: []
