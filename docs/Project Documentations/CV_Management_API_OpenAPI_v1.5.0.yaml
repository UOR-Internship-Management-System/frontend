        valid: true
        totalRows: 240
        validRows: 240
        invalidRows: 0
        errors: []
      - uploadId: 30000000-0000-4000-8000-000000000002
        validationStatus: FAILED
        valid: false
        totalRows: 240
        validRows: 238
        invalidRows: 2
        errors:
        - rowNumber: 17
          field: student_index_number
          code: STUDENT_NOT_FOUND
          message: No eligible Student matches the supplied index number.
          severity: ERROR
          rejectedValue: SC/2099/99999
          relatedRowNumber: null
        - rowNumber: 29
          field: course_code
          code: COURSE_NOT_FOUND
          message: The supplied course code is not present in the canonical subject catalogue.
