          readOnly: true
        totalRows:
          type: integer
          minimum: 0
          readOnly: true
        validRows:
          type: integer
          minimum: 0
          readOnly: true
        invalidRows:
          type: integer
          minimum: 0
          readOnly: true
        errors:
          type: array
          items:
            $ref: '#/components/schemas/AcademicLedgerValidationErrorResponse'
          readOnly: true
      description: Validation summary. totalRows must equal validRows plus invalidRows. valid is true only when validationStatus
        is PASSED and invalidRows is zero.
      examples:
      - uploadId: 30000000-0000-4000-8000-000000000001
