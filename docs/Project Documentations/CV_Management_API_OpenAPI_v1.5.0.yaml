        required: true
        schema:
          type: string
          format: uuid
        description: shortlistId identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportCreateRequest'
  /admin/exports/{exportJobId}/bulk-cvs/download:
    get:
      tags:
      - Exports
      summary: Download generated bulk CV archive.
      operationId: getAdminExportsByExportJobIdBulkCvsDownload
      responses:
        '200':
          description: Generated bulk CV archive attachment.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '415':
          $ref: '#/components/responses/Error415'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'
      description: 'Access: Admin. Audit: Yes. Archive contains latest saved ATS-compliant CV PDFs.'
      parameters:
      - name: exportJobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: exportJobId identifier.
  /admin/audit-events:
    get:
      tags:
      - Audit/System Events
      summary: Retrieve Admin-visible audit events when enabled by policy.
      operationId: getAdminAuditEvents
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAuditEventResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '415':
          $ref: '#/components/responses/Error415'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'
      description: 'Access: Admin. Audit: No. May be omitted if audit remains internal backend concern.'
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Size'
      - $ref: '#/components/parameters/Sort'
      - $ref: '#/components/parameters/Search'
  /admin/academic-ledger/uploads/{uploadId}/staged-rows:
    get:
      tags:
      - Academic Ledger
      summary: Retrieve normalized staged rows for an academic-ledger upload.
      operationId: getAdminAcademicLedgerUploadsByUploadIdStagedRows
      description: 'Access: Admin. Audit: No. Read-only. Staged rows are not official records. Version 1 exposes no update,
        delete, cancel, rollback, or inline-override operation.'
      security:
      - bearerAuth: []
      x-access-role: ADMIN
      x-audit-required: false
      x-mutation: false
      x-state-preconditions:
      - Upload status is STAGED, READY_TO_COMMIT, VALIDATION_FAILED, COMMITTING, or COMMITTED
      parameters:
      - name: uploadId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Academic-ledger upload identifier.
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Size'
      - $ref: '#/components/parameters/LedgerStagedRowSort'
      - $ref: '#/components/parameters/LedgerStagedRowSearch'
      - $ref: '#/components/parameters/LedgerRowValidationFilter'
      responses:
        '200':
          description: 'Typed staged-row page. No matches return items: [].'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAcademicLedgerStagedRowResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/LedgerBatchNotFound404'
        '409':
          $ref: '#/components/responses/LedgerNotReady409'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Zero-based page index.
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size with an implementation-defined upper bound.
    Sort:
      name: sort
      in: query
      schema:
        type: string
      description: Sort expression such as createdAt,desc.
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Search term applied to approved searchable fields.
    IfMatchVersion:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        pattern: ^"[0-9]+"$
        examples:
        - '"3"'
      description: Quoted entity version from the most recent response, for example `"3"`. The server returns 412 when the
        entity has changed.
    ClusterIdFilter:
      name: clusterId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Optional stable Core Cluster identifier. Category results are limited to that cluster; skill results are
        limited to skills mapped through categories in that cluster.
    CategoryIdFilter:
      name: categoryId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Optional stable Skill Category identifier. Skill results are limited to canonical Individual Skills mapped
        to this category.
    LedgerUploadSort:
      name: sort
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AcademicLedgerUploadSort'
      description: Constrained upload-batch sort. The backend adds uploadId ascending as a stable secondary sort.
    LedgerUploadStatusFilter:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AcademicLedgerUploadStatus'
      description: Optional upload lifecycle status filter.
    LedgerValidationStatusFilter:
      name: validationStatus
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AcademicLedgerValidationStatus'
      description: Optional validation lifecycle status filter.
    LedgerSearch:
      name: search
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 120
      description: Case-insensitive search over originalFilename only.
    LedgerStagedRowSort:
      name: sort
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AcademicLedgerStagedRowSort'
      description: Constrained staged-row sort. stagingRowId ascending is applied as a stable secondary sort.
    LedgerStagedRowSearch:
      name: search
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 120
      description: Case-insensitive search over student index number, course code, and resolved course title.
    LedgerRowValidationFilter:
      name: validationStatus
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AcademicLedgerRowValidationStatus'
      description: Optional row validation-status filter.
    RegisteredStudentLevel:
      name: level
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 3
        - 4
      description: Optional mutually exclusive Level 3 or Level 4 filter.
    RegisteredStudentSort:
      name: sort
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/RegisteredStudentSort'
      description: Wireframe-approved sort. Null GPA values are ordered last for both GPA directions. studentId ascending
        is applied as a stable secondary sort.
    RegisteredStudentSearch:
      name: search
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 120
      description: Case-insensitive search over fullName, indexNumber, universityEmail, and academicBatch.
    AcademicRecordSort:
      name: sort
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AcademicRecordSort'
      description: Constrained official academic-record sort with academicRecordId ascending as a stable secondary sort.
    AcademicRecordSearch:
      name: search
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 120
      description: Case-insensitive search over courseCode and courseTitle.
    CourseCodeFilter:
      name: courseCode
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 30
        pattern: ^[A-Za-z0-9._-]+$
      description: Optional exact canonical subject/course-code filter.
    StudentIdFilter:
      name: studentId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Optional stable Student identifier for global committed-record inspection.
  responses:
    Error400:
      description: Bad request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error401:
      description: Authentication required or invalid token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error403:
      description: Access denied.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error404:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error409:
      description: Conflict.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error412:
      description: Precondition failed or version conflict.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error415:
      description: Unsupported media type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error422:
      description: Validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error429:
      description: Too many requests.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error500:
      description: Internal server error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error503:
      description: Service unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error413:
      description: Payload too large.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Error428:
      description: Precondition required.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    DuplicateDeclaredSkill409:
      description: The Student has already declared the selected canonical taxonomy skill.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            duplicateDeclaredSkill:
              summary: Duplicate declared skill
              value:
                type: https://uor-cv-system/errors/declared-skill-duplicate
                title: Declared skill already exists
                status: 409
                code: DECLARED_SKILL_DUPLICATE
                message: React is already present in the Student declared-skill list.
                correlationId: req-20260716-0409
                details:
                  skillId: 11111111-1111-4111-8111-111111111111
    InvalidProjectDateRange422:
      description: Project validation failed because endDate is before startDate.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            invalidProjectDateRange:
              summary: Invalid project date range
              value:
                type: https://uor-cv-system/errors/project-date-range-invalid
                title: Project date range is invalid
                status: 422
                code: PROJECT_DATE_RANGE_INVALID
                message: endDate must not be before startDate.
                correlationId: req-20260716-0422
                fieldErrors:
                - field: endDate
                  code: INVALID_DATE_RANGE
                  message: endDate must not be before startDate.
    StaleProjectVersion412:
      description: The supplied project entity version is stale.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            staleProjectVersion:
              summary: Stale project update
              value:
                type: https://uor-cv-system/errors/version-conflict
                title: Project version conflict
                status: 412
                code: VERSION_CONFLICT
                message: The project changed after it was loaded. Refresh and retry with the latest version.
                correlationId: req-20260716-0412
                details:
                  projectId: 660e8400-e29b-41d4-a716-446655440001
                  submittedVersion: 2
                  currentVersion: 3
    MissingIfMatch428:
      description: The required If-Match entity-version header is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            missingIfMatch:
              summary: Missing optimistic-concurrency precondition
              value:
                type: https://uor-cv-system/errors/precondition-required
                title: Precondition required
                status: 428
                code: IF_MATCH_REQUIRED
                message: Supply the latest quoted entity version in the If-Match header.
                correlationId: req-20260716-0428
    InvalidCvConfiguration422:
      description: The CV preview configuration is structurally valid but semantically invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            invalidCvConfiguration:
              summary: Invalid CV configuration
              value:
                type: https://uor-cv-system/errors/cv-configuration-invalid
                title: CV configuration is invalid
                status: 422
                code: CV_CONFIGURATION_INVALID
                message: One or more selected records cannot be included in this CV preview.
                correlationId: req-20260721-0422
    CvPreviewExpired409:
      description: The preview exists but expired or was invalidated before it could be saved.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            cvPreviewExpired:
              summary: CV preview expired
              value:
                type: https://uor-cv-system/errors/cv-preview-expired
                title: CV preview expired
                status: 409
                code: CV_PREVIEW_EXPIRED
                message: Generate a new preview before saving the CV.
                correlationId: req-20260721-0409
                details:
                  previewId: 70000000-0000-4000-8000-000000000001
    StaleCv412:
      description: The active CV revision changed before this replacement request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://uor-cv-system/errors/stale-version
            title: Precondition failed
            status: 412
            code: STALE_VERSION
            message: The saved CV changed in another request.
            correlationId: req-20260718-0412
    CvPreconditionRequired428:
      description: The required first-create or replacement conditional header is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://uor-cv-system/errors/precondition-required
            title: Precondition required
            status: 428
            code: PRECONDITION_REQUIRED
            message: A current conditional request header is required.
            correlationId: req-20260718-0428
    CvGenerationFailed503:
      description: The backend-controlled LaTeX/PDF generation service could not complete the requested operation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            cvGenerationFailed:
              summary: CV generation failed
              value:
                type: https://uor-cv-system/errors/cv-generation-failed
                title: CV generation unavailable
                status: 503
                code: CV_GENERATION_FAILED
                message: The CV could not be generated at this time.
                correlationId: req-20260721-0503
                details: {}
    NoSavedCv404:
      description: No active saved CV exists for the authenticated Student.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            noSavedCv:
              summary: No saved CV
              value:
                type: https://uor-cv-system/errors/cv-not-saved
                title: No saved CV is available
                status: 404
                code: CV_NOT_SAVED
                message: Save the CV before downloading it.
                correlationId: req-20260721-0404
                details: {}
    CvFileUnavailable503:
      description: The saved CV metadata exists but its generated PDF is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            cvFileUnavailable:
              summary: CV PDF unavailable
              value:
                type: https://uor-cv-system/errors/cv-file-unavailable
                title: CV PDF unavailable
                status: 503
                code: CV_FILE_UNAVAILABLE
                message: The saved CV PDF cannot be downloaded at this time.
                correlationId: req-20260721-1503
                details: {}
    AcademicDataUnavailable503:
      description: The committed academic ledger service is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            academicDataUnavailable:
              summary: Academic data unavailable
              value:
                type: https://uor-cv-system/errors/academic-data-unavailable
                title: Academic data unavailable
                status: 503
                code: ACADEMIC_DATA_UNAVAILABLE
                message: Official academic data cannot be loaded at this time.
                correlationId: req-20260721-2503
                details: {}
    AdminDashboardUnavailable503:
      description: Admin dashboard metrics are temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            dashboardUnavailable:
              summary: Dashboard metrics unavailable
              value:
                type: https://uor-cv-system/errors/admin-dashboard-unavailable
                title: Admin dashboard unavailable
                status: 503
                code: ADMIN_DASHBOARD_UNAVAILABLE
                message: Admin dashboard metrics cannot be loaded at this time.
                correlationId: req-20260719-1503
    LedgerFileTooLarge413:
      description: The ledger file exceeds the frozen 5 MiB maximum.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            ledgerFileTooLarge:
              summary: Ledger file too large
              value:
                type: https://uor-cv-system/errors/ledger-file-too-large
                title: Academic ledger file is too large
                status: 413
                code: LEDGER_FILE_TOO_LARGE
                message: Upload a CSV file no larger than 5 MiB.
                correlationId: req-20260719-1413
                details:
                  maxSizeBytes: 5242880
    LedgerUnsupportedMediaType415:
      description: Only UTF-8 text/csv with a .csv filename is accepted.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unsupportedLedgerMedia:
              summary: Unsupported ledger media type
              value:
                type: https://uor-cv-system/errors/ledger-media-type-unsupported
                title: Unsupported academic ledger format
                status: 415
                code: LEDGER_MEDIA_TYPE_UNSUPPORTED
                message: Upload a UTF-8 CSV file with media type text/csv.
                correlationId: req-20260719-1415
                details:
                  acceptedMediaType: text/csv
                  acceptedExtension: .csv
    LedgerParseFailed422:
      description: The CSV is readable as a file but cannot be parsed under the frozen ledger column contract.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            ledgerParseFailed:
              summary: Ledger parse failed
              value:
                type: https://uor-cv-system/errors/ledger-parse-failed
                title: Academic ledger could not be parsed
                status: 422
                code: LEDGER_PARSE_FAILED
                message: The CSV header or one or more rows do not match the approved academic-ledger format.
                correlationId: req-20260719-1422
                details:
                  expectedHeaders:
                  - student_index_number
                  - course_code
                  - credits
                  - letter_grade
                  - semester
                  - academic_year
                  - attempt_number
                  - result_status
    LedgerDuplicateUpload409:
      description: Identical content already exists in an active or committed upload batch.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            duplicateLedgerUpload:
              summary: Duplicate ledger upload
              value:
                type: https://uor-cv-system/errors/ledger-duplicate-upload
                title: Duplicate academic ledger upload
                status: 409
                code: LEDGER_DUPLICATE_UPLOAD
                message: Identical academic ledger content already exists in an active or committed batch.
                correlationId: req-20260719-1409
                details:
                  existingUploadId: 30000000-0000-4000-8000-000000000001
    LedgerBatchNotFound404:
      description: The addressed ledger upload batch does not exist.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            ledgerBatchNotFound:
              summary: Ledger batch not found
              value:
                type: https://uor-cv-system/errors/ledger-upload-not-found
                title: Academic ledger upload not found
                status: 404
                code: LEDGER_UPLOAD_NOT_FOUND
                message: No academic ledger upload exists for the supplied identifier.
                correlationId: req-20260719-1404
    LedgerNotReady409:
      description: The upload batch is not in a state that exposes the requested staged or validation data.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            ledgerNotReady:
              summary: Ledger batch not ready
              value:
                type: https://uor-cv-system/errors/ledger-not-ready
                title: Academic ledger batch is not ready
                status: 409
                code: LEDGER_NOT_READY
                message: Wait for parsing and staging to complete before requesting this resource.
                correlationId: req-20260719-2409
                details:
                  currentStatus: PROCESSING
    LedgerCommitState409:
      description: The batch is not ready, is already committed, or another commit owns the state lock.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            notReadyToCommit:
              summary: Not ready to commit
              value:
                type: https://uor-cv-system/errors/ledger-not-ready-to-commit
                title: Academic ledger is not ready to commit
                status: 409
                code: LEDGER_NOT_READY_TO_COMMIT
                message: Only a READY_TO_COMMIT upload batch can be committed.
                correlationId: req-20260719-3409
                details:
                  currentStatus: STAGED
            alreadyCommitted:
              summary: Already committed
              value:
                type: https://uor-cv-system/errors/ledger-already-committed
                title: Academic ledger is already committed
                status: 409
                code: LEDGER_ALREADY_COMMITTED
                message: The upload batch has already been committed and cannot be committed again.
                correlationId: req-20260719-3410
                details:
                  currentStatus: COMMITTED
            concurrentCommit:
              summary: Concurrent commit conflict
              value:
                type: https://uor-cv-system/errors/ledger-commit-conflict
                title: Academic ledger commit conflict
                status: 409
                code: LEDGER_COMMIT_CONFLICT
                message: Another request is currently committing this upload batch.
                correlationId: req-20260719-3411
                details:
                  currentStatus: COMMITTING
    LedgerValidationFailed422:
      description: The batch failed semantic validation and cannot be committed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            ledgerValidationFailed:
              summary: Ledger validation failed
              value:
                type: https://uor-cv-system/errors/ledger-validation-failed
                title: Academic ledger validation failed
                status: 422
                code: LEDGER_VALIDATION_FAILED
                message: Resolve the invalid rows in the source file and upload a corrected batch.
                correlationId: req-20260719-3422
                details:
                  invalidRows: 2
    LedgerCommitFailed500:
      description: The atomic commit transaction failed and was fully rolled back.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            ledgerCommitFailed:
              summary: Ledger commit failed
              value:
                type: https://uor-cv-system/errors/ledger-commit-failed
                title: Academic ledger commit failed
                status: 500
                code: LEDGER_COMMIT_FAILED
                message: No academic records were committed. The batch remains ready for a safe retry.
                correlationId: req-20260719-3500
                details:
                  transactionRolledBack: true
    RegisteredStudentNotFound404:
      description: The addressed registered Student does not exist or is unavailable to this Admin context.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            studentNotFound:
              summary: Registered Student not found
              value:
                type: https://uor-cv-system/errors/registered-student-not-found
