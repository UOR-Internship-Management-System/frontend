  /admin/academic-ledger/uploads/{uploadId}/commit:
    post:
      tags:
      - Academic Ledger
      summary: Atomically commit a validated academic-ledger upload.
      operationId: postAdminAcademicLedgerUploadsByUploadIdCommit
      description: 'Access: Admin. Audit: Yes for success and failure. Mutation: promotes all staged rows to official grades
        and recalculates affected Computer Science GPA summaries in one transaction. A backend row/state lock performs READY_TO_COMMIT
        -> COMMITTING -> COMMITTED. Concurrent or repeated commits return 409. A failed transaction is fully rolled back and
        the batch returns to READY_TO_COMMIT for a safe retry.'
      security:
      - bearerAuth: []
      x-access-role: ADMIN
      x-audit-required: true
      x-mutation: true
      x-state-preconditions:
      - Upload status is READY_TO_COMMIT
      - Validation status is PASSED
      - invalidRows is zero
      parameters:
      - name: uploadId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Academic-ledger upload identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicLedgerCommitRequest'
      responses:
        '200':
          description: All official records and GPA summaries committed atomically.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademicLedgerCommitResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/LedgerBatchNotFound404'
        '409':
          $ref: '#/components/responses/LedgerCommitState409'
        '422':
          $ref: '#/components/responses/LedgerValidationFailed422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/LedgerCommitFailed500'
        '503':
          $ref: '#/components/responses/Error503'
