name: Regenerate Motion Baselines

'on':
  push:
    branches:
      - feature/sprint-6-animation-hardening

jobs:
  baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test e2e/motion-accessibility.spec.ts --project=chromium --update-snapshots
      - uses: actions/upload-artifact@v4
        with:
          name: linux-motion-baselines
          path: e2e/motion-accessibility.spec.ts-snapshots/*.png
          if-no-files-found: error
