name: Regenerate Skeleton Baselines

'on':
  push:
    branches:
      - feature/sprint-6-animation-hardening

jobs:
  baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:visual -- --update-snapshots
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: linux-skeleton-baselines
          path: e2e/skeleton-visuals.spec.ts-snapshots/*.png
          if-no-files-found: error
